services:
  db:
    image: postgres:16
    container_name: wc-pool-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wc_pool
    ports:
      - "5432:5432"
    volumes:
      - wc_pool_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  wc_pool_pg: